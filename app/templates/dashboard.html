<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetricCollector</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="topbar">
    <h1>MetricCollector</h1>
    <div class="actions">
        <button class="source-btn" onclick="toggleCredentials()">Credentials</button>
    </div>
</div>

<div class="container">
    <!-- Credentials panel (hidden by default) -->
    <div id="creds-panel" class="creds-panel" style="display:none;">
        <h2 class="creds-heading">Service Credentials</h2>
        <p class="creds-subtext">Enter credentials for the services you want to query. They are stored in your browser session only.</p>

        <div class="creds-grid">
            <!-- vCenter -->
            <div class="creds-section">
                <h3>vCenter</h3>
                <input type="text" id="vcenter_host" placeholder="vCenter Host" autocomplete="off">
                <input type="text" id="vcenter_user" placeholder="Username" autocomplete="off">
                <input type="password" id="vcenter_password" placeholder="Password" autocomplete="off">
                <label class="creds-checkbox">
                    <input type="checkbox" id="vcenter_disable_ssl" checked> Disable SSL verification
                </label>
            </div>

            <!-- Jira -->
            <div class="creds-section">
                <h3>Jira</h3>
                <input type="url" id="jira_url" placeholder="Jira URL (https://org.atlassian.net)" autocomplete="off">
                <input type="email" id="jira_user" placeholder="Email" autocomplete="off">
                <input type="password" id="jira_api_token" placeholder="API Token" autocomplete="off">
            </div>

            <!-- Confluence -->
            <div class="creds-section">
                <h3>Confluence</h3>
                <input type="url" id="confluence_url" placeholder="Confluence URL (https://org.atlassian.net/wiki)" autocomplete="off">
                <input type="email" id="confluence_user" placeholder="Email" autocomplete="off">
                <input type="password" id="confluence_api_token" placeholder="API Token" autocomplete="off">
            </div>
        </div>

        <button class="source-btn active" style="margin-top:1rem;" onclick="saveCredentials()">Save Credentials</button>
    </div>

    <!-- Source selector -->
    <div class="source-bar" id="source-bar"></div>

    <!-- Optional filters -->
    <div id="filter-bar" style="margin-bottom:1.5rem;display:none;">
        <input class="filter-input" id="filter-input" placeholder="Project key / Space key">
        <button class="source-btn" style="margin-left:0.5rem;" onclick="fetchMetrics()">Apply</button>
    </div>

    <!-- Export buttons -->
    <div class="export-bar" id="export-bar" style="display:none;">
        <button class="export-btn" onclick="exportJSON()">Export JSON</button>
        <button class="export-btn" onclick="exportCSV()">Export CSV</button>
        <button class="export-btn" onclick="exportTableau()">Export Tableau CSV</button>
    </div>

    <!-- Loading / error -->
    <div id="loading" style="display:none;"><div class="spinner"></div> Fetching metrics...</div>
    <div id="error-msg"></div>

    <!-- Metrics display -->
    <div class="metrics-grid" id="metrics-grid"></div>
    <div id="detail-tables"></div>
</div>

<script>
const API = '/api/metrics';
let currentSource = null;
let currentData = null;

// ---- Credentials helpers ----
function getCredentials() {
    const raw = sessionStorage.getItem('credentials');
    return raw ? JSON.parse(raw) : {};
}

function saveCredentials() {
    const creds = {
        vcenter_host: document.getElementById('vcenter_host').value,
        vcenter_user: document.getElementById('vcenter_user').value,
        vcenter_password: document.getElementById('vcenter_password').value,
        vcenter_disable_ssl: document.getElementById('vcenter_disable_ssl').checked,
        jira_url: document.getElementById('jira_url').value,
        jira_user: document.getElementById('jira_user').value,
        jira_api_token: document.getElementById('jira_api_token').value,
        confluence_url: document.getElementById('confluence_url').value,
        confluence_user: document.getElementById('confluence_user').value,
        confluence_api_token: document.getElementById('confluence_api_token').value,
    };
    sessionStorage.setItem('credentials', JSON.stringify(creds));
    document.getElementById('creds-panel').style.display = 'none';
}

function loadCredentialsIntoForm() {
    const creds = getCredentials();
    for (const [key, val] of Object.entries(creds)) {
        const el = document.getElementById(key);
        if (!el) continue;
        if (el.type === 'checkbox') el.checked = val;
        else el.value = val || '';
    }
}

function toggleCredentials() {
    const panel = document.getElementById('creds-panel');
    if (panel.style.display === 'none') {
        loadCredentialsIntoForm();
        panel.style.display = 'block';
    } else {
        panel.style.display = 'none';
    }
}

// ---- Init: load sources ----
(async function init() {
    try {
        const res = await fetch(API + '/sources');
        const data = await res.json();
        const bar = document.getElementById('source-bar');
        data.sources.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'source-btn';
            btn.textContent = s.label;
            btn.dataset.id = s.id;
            btn.addEventListener('click', () => selectSource(s.id));
            bar.appendChild(btn);
        });
    } catch (e) {
        showError('Failed to load sources: ' + e.message);
    }

    // Show credentials panel on first visit if nothing saved
    if (!sessionStorage.getItem('credentials')) {
        document.getElementById('creds-panel').style.display = 'block';
    }
})();

function selectSource(id) {
    currentSource = id;
    document.querySelectorAll('.source-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));

    const filterBar = document.getElementById('filter-bar');
    const filterInput = document.getElementById('filter-input');
    if (id === 'jira') {
        filterBar.style.display = 'flex';
        filterInput.placeholder = 'Jira project key (optional)';
        filterInput.value = '';
    } else if (id === 'confluence') {
        filterBar.style.display = 'flex';
        filterInput.placeholder = 'Confluence space key (optional)';
        filterInput.value = '';
    } else {
        filterBar.style.display = 'none';
        filterInput.value = '';
    }

    fetchMetrics();
}

async function fetchMetrics() {
    const grid = document.getElementById('metrics-grid');
    const tables = document.getElementById('detail-tables');
    const loading = document.getElementById('loading');
    const exportBar = document.getElementById('export-bar');

    grid.innerHTML = '';
    tables.innerHTML = '';
    loading.style.display = 'block';
    exportBar.style.display = 'none';
    hideError();

    let url = API + '/' + currentSource;
    const filter = document.getElementById('filter-input').value.trim();
    if (filter) {
        const param = currentSource === 'jira' ? 'project' : 'space';
        url += '?' + param + '=' + encodeURIComponent(filter);
    }

    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(getCredentials()),
        });
        const data = await res.json();
        currentData = data;

        if (data.error) {
            showError('Collector error: ' + data.error);
        }

        loading.style.display = 'none';
        exportBar.style.display = 'flex';
        renderMetrics(data);
    } catch (e) {
        loading.style.display = 'none';
        showError('Request failed: ' + e.message);
    }
}

function renderMetrics(data) {
    const grid = document.getElementById('metrics-grid');
    const tables = document.getElementById('detail-tables');

    const scalars = {};
    const details = {};
    for (const [k, v] of Object.entries(data)) {
        if (k === 'source' || k === 'collected_at' || k === 'error') continue;
        if (Array.isArray(v) && v.length && typeof v[0] === 'object') {
            details[k] = v;
        } else if (typeof v !== 'object') {
            scalars[k] = v;
        }
    }

    for (const [k, v] of Object.entries(scalars)) {
        const label = k.replace(/_/g, ' ');
        grid.innerHTML += `<div class="metric-card"><div class="label">${label}</div><div class="value">${v}</div></div>`;
    }

    for (const [k, rows] of Object.entries(details)) {
        const title = k.replace(/_/g, ' ');
        const cols = Object.keys(rows[0]);
        let html = `<div class="detail-section"><h3>${title}</h3><table class="detail-table"><thead><tr>`;
        cols.forEach(c => html += `<th>${c.replace(/_/g, ' ')}</th>`);
        html += '</tr></thead><tbody>';
        rows.forEach(row => {
            html += '<tr>';
            cols.forEach(c => html += `<td>${row[c] ?? ''}</td>`);
            html += '</tr>';
        });
        html += '</tbody></table></div>';
        tables.innerHTML += html;
    }
}

// ---- Export functions ----
function exportJSON() {
    if (!currentData) return;
    const blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
    downloadBlob(blob, currentSource + '_metrics.json');
}

async function exportCSV() {
    const url = buildExportUrl('csv');
    await downloadFromApi(url, currentSource + '_metrics.csv');
}

async function exportTableau() {
    const url = buildExportUrl('tableau');
    await downloadFromApi(url, currentSource + '_tableau.csv');
}

function buildExportUrl(type) {
    let url = API + '/' + currentSource + '/' + type;
    const filter = document.getElementById('filter-input').value.trim();
    if (filter) {
        const param = currentSource === 'jira' ? 'project' : 'space';
        url += '?' + param + '=' + encodeURIComponent(filter);
    }
    return url;
}

async function downloadFromApi(url, filename) {
    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(getCredentials()),
        });
        const blob = await res.blob();
        downloadBlob(blob, filename);
    } catch (e) {
        showError('Export failed: ' + e.message);
    }
}

function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
}

function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
}
function hideError() {
    document.getElementById('error-msg').style.display = 'none';
}
</script>
</body>
</html>
